# Server host/interface to bind to. Default is empty ("") to bind all interfaces (IPv4 + IPv6).
# Use "127.0.0.1" or "localhost" to restrict access to local machine only.
host: ""

# Server port
port: 8317

# TLS settings for HTTPS. When enabled, the server listens with the provided certificate and key.
tls:
  enable: false
  cert: ""
  key: ""

# Management API settings
remote-management:
  # Whether to allow remote (non-localhost) management access.
  # When false, only localhost can access management endpoints (a key is still required).
  allow-remote: false

  # Management key. If a plaintext value is provided here, it will be hashed on startup.
  # All management requests (even from localhost) require this key.
  # Leave empty to disable the Management API entirely (404 for all /v0/management routes).
  secret-key: ""

  # Disable the bundled management control panel asset download and HTTP route when true.
  disable-control-panel: false

  # GitHub repository for the management control panel. Accepts a repository URL or releases API URL.
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

# Authentication directory (supports ~ for home directory)
auth-dir: "~/.cli-proxy-api"

# API keys for authentication
api-keys:
  - "your-api-key-1"
  - "your-api-key-2"
  - "your-api-key-3"

# Per-client API key policies (restrictions and usage quotas).
# - excluded-models supports '*' wildcard matching and is case-insensitive.
# - allow-claude-opus-4-6: when false, requests for claude-opus-4-6* are downgraded to claude-opus-4-5-20251101*.
# - model-routing: optional deterministic time-window routing to a target model (e.g. split Claude -> Codex by hour).
# - failover: optional per-provider automatic retry to a target model when a provider becomes unavailable.
#   Supports model-specific rules to override the target based on the requested model (wildcards supported).
#   (e.g. Claude weekly cap / rolling-window caps / account issues). Useful for automatically switching to Codex.
# - daily-limits: request counts are tracked per day in China Standard Time (UTC+8).
# - claude-usage-limit-usd: when enable-claude-models is true, the API key may keep using Claude
#   until cumulative Claude spend reaches this limit. Once reached, it falls back to the global
#   Claude -> GPT default strategy (only when claude-to-gpt-routing-enabled is true).
# - daily-budget-usd / weekly-budget-usd: spend quotas are tracked from persisted billing data.
#   Weekly quota windows are 7-day cycles anchored to weekly-budget-anchor-at when set,
#   otherwise to the API key created_at timestamp from the API key config store.
# - token-package-usd / token-package-started-at: one-time prepaid spend allowance for the API key.
#   While package balance remains, daily/weekly spend budgets are bypassed. Once exhausted,
#   daily/weekly spend budgets resume counting only from the depletion point forward.
# - Storage:
#   - api-key policies / top-level api-keys can be persisted in Postgres via
#     APIKEY_POLICY_PG_DSN / APIKEY_POLICY_PG_SCHEMA.
#   - session trajectory tables can be moved to a dedicated Postgres via
#     SESSION_TRAJECTORY_PG_DSN / SESSION_TRAJECTORY_PG_SCHEMA.
#   - daily counters and billing data require Postgres-backed persistence.
api-key-policies:
  - api-key: "your-api-key-1"
    # Optional: override upstream base URL for this client API key.
    # When set, /v1/* requests will be transparently proxied to this base URL (treat it as the provider address).
    # Examples:
    #   - "http://127.0.0.1:8001" (incoming /v1/models -> http://127.0.0.1:8001/v1/models)
    #   - "http://127.0.0.1:8001/v1" (incoming /v1/models -> http://127.0.0.1:8001/v1/models)
    upstream-base-url: ""
    # Optional: restrict which Codex auth channel this client API key may use.
    # Values: auto | provider | auth_file
    codex-channel-mode: "auto"
    excluded-models:
      - "claude-haiku-4-5-20251001"
    model-routing:
      rules:
        - enabled: true
          from-model: "claude-opus-4-6*"
          target-model: "gpt-5.4(high)"
          target-percent: 50
          sticky-window-seconds: 3600
        - enabled: true
          from-model: "claude-sonnet-4-6*"
          target-model: "gpt-5.4(medium)"
          target-percent: 50
          sticky-window-seconds: 3600
    failover:
      claude:
        enabled: true
        target-model: "gpt-5.4(medium)" # default fallback when no rules match
        rules:
          - from-model: "claude-opus-4-6*"
            target-model: "gpt-5.4(high)"
          - from-model: "claude-sonnet-4-6*"
            target-model: "gpt-5.4(medium)"
    claude-usage-limit-usd: 30
    allow-claude-opus-4-6: true
    token-package-usd: 1000
    token-package-started-at: "2026-03-25T12:00:00+08:00"
    weekly-budget-usd: 400
    daily-limits:
      claude-opus-4-6: 10

# Enable debug logging
debug: false

# Enable pprof HTTP debug server (host:port). Keep it bound to localhost for safety.
pprof:
  enable: false
  addr: "127.0.0.1:8316"

# When true, disable high-overhead HTTP middleware features to reduce per-request memory usage under high concurrency.
commercial-mode: false

# When true, write application logs to rotating files instead of stdout
logging-to-file: false

# Maximum total size (MB) of log files under the logs directory. When exceeded, the oldest log
# files are deleted until within the limit. Set to 0 to disable.
logs-max-total-size-mb: 0

# Maximum number of error log files retained when request logging is disabled.
# When exceeded, the oldest error log files are deleted. Default is 10. Set to 0 to disable cleanup.
error-logs-max-files: 10

# Optional Telegram alerts for provider failover/degradation and error logs.
notifications:
  telegram:
    enabled: false
    # Leave empty to read from TELEGRAM_BOT_TOKEN / TG_BOT_TOKEN in .env or environment.
    bot-token: ""
    provider-chat-id: "-1003967150757"
    error-log-chat-id: ""
    send-recovery: false
    recovery-min-cooldown-seconds: 300
    request-timeout-seconds: 10
    provider:
      backoff: ["5m", "15m", "30m", "1h"]
    error-log:
      min-level: "error"
      backoff: ["1m", "5m", "15m", "1h", "6h"]
      exclude-patterns:
        - "broken pipe"
        - "context canceled"
        - "context deadline exceeded"
        - "use of closed network connection"
        - "client disconnected"

# When false, disable in-memory usage statistics aggregation
usage-statistics-enabled: false

# When false, stop persisting new session request/response trajectories to PostgreSQL.
session-trajectory-enabled: true

# Proxy URL. Supports socks5/http/https protocols. Example: socks5://user:pass@192.168.1.1:1080/
proxy-url: ""

# Deprecated global target-family override. New global defaults are:
#   claude-opus-*  -> gpt-5.4(<effort>)
#   other claude-* -> gpt-5.3-codex(<effort>)
# Per-API-key `claude-gpt-target-family` overrides still work when explicitly configured.
claude-to-gpt-target-family: ""

# Default reasoning effort for synthesized global Claude -> GPT routing/failover rules.
# Supported values: low, medium, high
claude-to-gpt-reasoning-effort: "high"

# When true, unprefixed model requests only use credentials without a prefix (except when prefix == model name).
force-model-prefix: false

# When true, Claude -> GPT blackbox routing also injects a stronger Claude/Opus-style behavior prompt.
claude-style-enabled: false

# Editable Claude/Opus-style prompt used by the blackbox masquerade layer.
# Leave empty to use the built-in default template.
claude-style-prompt: ""

# Number of times to retry a request. Retries will occur if the HTTP response code is 403, 408, 500, 502, 503, or 504.
request-retry: 3

# Maximum wait time in seconds for a cooled-down credential before triggering a retry.
max-retry-interval: 30

# Quota exceeded behavior
quota-exceeded:
  switch-project: true # Whether to automatically switch to another project when a quota is exceeded
  switch-preview-model: true # Whether to automatically switch to a preview model when a quota is exceeded

# Routing strategy for selecting credentials when multiple match.
routing:
  strategy: "round-robin" # round-robin (default), fill-first

# When true, enable authentication for the WebSocket API (/v1/ws).
ws-auth: false

# When > 0, emit blank lines every N seconds for non-streaming responses to prevent idle timeouts.
nonstream-keepalive-interval: 0

# Streaming behavior (SSE keep-alives + safe bootstrap retries).
# streaming:
#   keepalive-seconds: 15   # Default: 0 (disabled). <= 0 disables keep-alives.
#   bootstrap-retries: 1    # Default: 0 (disabled). Retries before first byte is sent.

